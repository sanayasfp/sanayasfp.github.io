<div class="theme-toggle" style="display: inline-block; margin-left: 10px; vertical-align: middle;">
  <button id="theme-toggle" aria-label="Toggle Theme" style="background: none; border: none; cursor: pointer; padding: 0; color: inherit; display: flex; align-items: center;">
    <i id="theme-toggle-icon" style="width: 20px; height: 20px;"></i>
  </button>
</div>

<!-- Import Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<script>
  (function() {
    const toggle = document.getElementById('theme-toggle');
    const iconSpan = document.getElementById('theme-toggle-icon');
    const html = document.documentElement;

    const getTheme = () => localStorage.getItem('theme') || 'system';
    
    const updateUI = (theme) => {
      // Map theme to Lucide icon names
      const iconMap = {
        'system': 'monitor',
        'light': 'sun',
        'dark': 'moon'
      };
      
      // Update data-theme attribute
      if (theme === 'system') {
        html.removeAttribute('data-theme');
      } else {
        html.setAttribute('data-theme', theme);
      }

      // Update Lucide icon
      iconSpan.setAttribute('data-lucide', iconMap[theme]);
      if (window.lucide) {
        lucide.createIcons();
      }
    };

    toggle.addEventListener('click', () => {
      const current = getTheme();
      let next;
      if (current === 'system') next = 'light';
      else if (current === 'light') next = 'dark';
      else next = 'system';
      
      localStorage.setItem('theme', next);
      updateUI(next);
    });

    // Initial load - check if lucide is ready
    const init = () => {
      if (window.lucide) {
        updateUI(getTheme());
      } else {
        setTimeout(init, 50);
      }
    };
    init();
  })();
</script>

<style>
  /* Ensure icons inherit text color and have consistent size */
  #theme-toggle-icon {
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }
  
  /* Small hover effect for the button */
  #theme-toggle:hover {
    opacity: 0.7;
  }
</style>
