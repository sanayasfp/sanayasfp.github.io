<div class="theme-toggle" style="display: inline-block; margin-left: 10px; vertical-align: middle;">
  <button id="theme-toggle" aria-label="Toggle Theme" style="background: none; border: none; cursor: pointer; padding: 0; color: inherit; display: flex; align-items: center;">
    <span id="theme-toggle-container" style="display: flex; align-items: center; font-size: 1.2rem;">
      <i id="theme-toggle-icon" class="bi"></i>
    </span>
  </button>
</div>

<script>
  (function() {
    const toggle = document.getElementById('theme-toggle');
    const icon = document.getElementById('theme-toggle-icon');
    const html = document.documentElement;

    const getTheme = () => localStorage.getItem('theme') || 'system';
    
    const updateUI = (theme) => {
      const iconMap = { 
        'system': 'bi-display', 
        'light': 'bi-sun', 
        'dark': 'bi-moon-stars' 
      };

      if (theme === 'system') html.removeAttribute('data-theme');
      else html.setAttribute('data-theme', theme);

      // Update Bootstrap Icon classes
      icon.className = 'bi ' + iconMap[theme];
    };

    toggle.addEventListener('click', () => {
      const current = getTheme();
      const next = current === 'system' ? 'light' : (current === 'light' ? 'dark' : 'system');
      localStorage.setItem('theme', next);
      updateUI(next);
    });

    updateUI(getTheme());
  })();
</script>

<style>
  #theme-toggle:hover {
    opacity: 0.7;
  }
</style>
