{%- assign lang = page.lang | default: "fr" -%}
{%- assign home = site.data.navigation[lang].menu | first -%}

<header class="post-header">
  <a href="{{ home.url | relative_url }}" class="breadcrumb-home">{{ home.title }}</a>
  <h1 class="post-title">{{ page.title | escape }}</h1>
  <div class="post-meta-custom">
    {% include read-time.html %} · {{ page.author | default: site.author.name | default: site.title }}
  </div>
</header>
