<div class="social-links">
  {%- for link in site.minima.social_links -%}
  <a class="social-link-item" href="{{ link.url }}" target="_blank" rel="me" title="{{ link.title }}">
    <i class="bi bi-{{ link.icon }}" style="font-size: 1.2rem;"></i>
    <span class="social-link-label">{{ link.title }}</span>
  </a>
  {%- endfor -%}
</div>
