<header class="site-header">

  <div class="wrapper">
    {%- assign lang = page.lang | default: "fr" -%}
    {%- assign nav_data = site.data.navigation[lang] -%}
    {%- assign home = nav_data.menu | first -%}
    
    <a class="site-title" rel="author" href="{{ home.url | relative_url }}">{{ site.title | escape }}</a>
    {% include theme-toggle.html %}

    <nav class="site-nav">
      <input type="checkbox" id="nav-trigger" />
      <label for="nav-trigger">
        <span class="menu-icon"></span>
      </label>

      {% include nav-items.html navigation = nav_data.menu %}
    </nav>
  </div>
</header>
